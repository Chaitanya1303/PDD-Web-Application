name: E2E Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Remove incorrect chromedriver for CI
      run: npm uninstall chromedriver

    - name: Start development server
      run: npm run dev -- --port 8080 &
      
    - name: Wait for server to start
      run: |
        echo "Waiting for dev server to be ready on port 8080..."
        while ! curl -s http://localhost:8080 > /dev/null; do
          sleep 2
        done
        echo "Server is up!"

    - name: Run E2E Tests
      run: npm run test:e2e

    - name: Upload Excel Report Artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: e2e-test-report
        path: tests/e2e/*.xlsx
